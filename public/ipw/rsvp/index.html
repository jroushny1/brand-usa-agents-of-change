<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register — AI Meetup at IPW 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&family=Oswald:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --cyan: #00A9E0;
  --usa-blue: #00549F;
  --navy: #101F36;
  --slate: #4C5768;
  --pond: #878F9A;
  --cream: #F4EFE3;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Montserrat', sans-serif; color: var(--slate); background: #fff; line-height: 1.6; }

.topnav { background: #fff; padding: 1rem 2rem; }
.topnav a { display: inline-block; }
.topnav-logo { height: 70px; display: block; }

.section-banner { background: var(--navy); padding: 2rem 2rem 1.5rem; }
.section-banner h2 {
  max-width: 640px;
  margin: 0 auto;
  font-family: 'Oswald', sans-serif;
  font-size: 2rem;
  font-weight: 600;
  color: #fff;
  text-transform: uppercase;
  letter-spacing: .04em;
}

.container { max-width: 640px; margin: 0 auto; padding: 2rem 2rem 4rem; }

.subtitle { font-size: .95rem; color: var(--pond); margin-bottom: 2rem; }

label { display: block; font-size: .85rem; font-weight: 600; color: var(--navy); margin-bottom: .35rem; }
.required::after { content: ' *'; color: var(--cyan); }

input[type="text"],
input[type="email"],
textarea {
  width: 100%;
  padding: .65rem .85rem;
  border: 1px solid #ddd;
  border-radius: 4px;
  font-family: 'Montserrat', sans-serif;
  font-size: .9rem;
  color: var(--slate);
  margin-bottom: 1.25rem;
  transition: border-color .2s;
}
input:focus, textarea:focus { outline: none; border-color: var(--cyan); }
textarea { resize: vertical; min-height: 80px; }

.field-group { margin-bottom: 1.5rem; }
.field-group legend {
  font-size: .85rem;
  font-weight: 600;
  color: var(--navy);
  margin-bottom: .5rem;
  display: block;
}

.checkbox-list { list-style: none; }
.checkbox-list li { margin-bottom: .5rem; }
.checkbox-list label {
  display: flex;
  align-items: flex-start;
  gap: .5rem;
  font-weight: 400;
  color: var(--slate);
  cursor: pointer;
  line-height: 1.4;
}
.checkbox-list input[type="checkbox"] {
  margin-top: .2rem;
  accent-color: var(--cyan);
  width: 16px;
  height: 16px;
  flex-shrink: 0;
}

.day-label {
  font-family: 'Oswald', sans-serif;
  font-size: .75rem;
  font-weight: 600;
  color: var(--pond);
  text-transform: uppercase;
  letter-spacing: .06em;
  margin-top: .75rem;
  margin-bottom: .35rem;
}
.day-label:first-child { margin-top: 0; }

.session-name { font-weight: 600; color: var(--navy); }
.session-time { color: var(--pond); font-size: .82rem; }

.submit-btn {
  display: inline-block;
  background: var(--cyan);
  color: #fff;
  font-family: 'Oswald', sans-serif;
  font-size: 1rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: .04em;
  border: none;
  padding: .75rem 2.5rem;
  border-radius: 4px;
  cursor: pointer;
  transition: background .2s;
  margin-top: .5rem;
}
.submit-btn:hover { background: var(--usa-blue); }
.submit-btn:disabled { background: var(--pond); cursor: not-allowed; }

.back-link {
  display: inline-block;
  margin-top: 1.5rem;
  font-size: .85rem;
  color: var(--cyan);
  text-decoration: none;
}
.back-link:hover { text-decoration: underline; }

.error-msg {
  color: #c0392b;
  font-size: .85rem;
  margin-top: .5rem;
  display: none;
}

@media (max-width: 600px) {
  .container { padding: 1.5rem 1rem 3rem; }
  .section-banner h2 { font-size: 1.5rem; }
}
</style>
</head>
<body>

<nav class="topnav">
  <a href="https://www.thebrandusa.com">
    <svg class="topnav-logo" viewBox="0 0 415.12 296.38" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Brand USA">
      <defs><style>.lu1{fill:#00549F;stroke-width:0}.lu2{fill:#00a9e0;stroke-width:0}</style></defs>
      <g><g><path class="lu1" d="M88.18,170.68v-48.75h25.5v48.13c0,11.32,5.47,18.16,15.55,18.16s15.55-6.84,15.55-18.16v-48.13h25.5v48.75c0,25.12-14.05,39.43-41.04,39.43s-41.04-14.3-41.04-39.43Z"/><path class="lu1" d="M295.47,121.42h-31.22l-15.22,42.79c2.77,4.63,4.17,10.2,4.17,16.67,0,12.02-5.04,21.52-14.03,27.61h19.11l5.47-16.29h31.96l5.47,16.29h25.75l-31.47-87.06ZM270.34,172.29l9.33-27.74,9.33,27.74h-18.66Z"/></g><path class="lu1" d="M213.15,120.31c-22.76,0-37.19,10.07-37.19,28.11,0,34.2,46.02,22.14,46.02,34.82,0,4.1-3.23,6.47-12.06,6.47-9.57,0-18.89-2.86-26.97-8.45l-7.46,21.03c9,5.03,20.32,7.81,34.44,7.81,23.51,0,36.94-11.19,36.94-29.23,0-34.58-46.02-22.64-46.02-34.2,0-3.98,3.98-5.97,12.44-5.97s16.12,2.47,21.47,6.31l7.21-20.32c-7.42-3.81-17.46-6.39-28.81-6.39Z"/></g>

    </svg>
  </a>
</nav>

<div class="section-banner">
  <h2>Register to Attend</h2>
</div>

<div class="container">
  <div class="subtitle">AI Meetup at IPW 2026 &mdash; Brand USA Booth, Broward County Convention Center, May 19&ndash;21.</div>

  <form id="rsvp-form">
    <label class="required" for="name">Full Name</label>
    <input type="text" id="name" name="name" required>

    <label class="required" for="email">Email</label>
    <input type="email" id="email" name="email" required>

    <label class="required" for="org">Organization</label>
    <input type="text" id="org" name="organization" required>

    <label for="role">Title / Role</label>
    <input type="text" id="role" name="role">

    <fieldset class="field-group" style="border:none; padding:0;">
      <legend class="required">Which sessions would you like to attend?</legend>

      <div class="day-label">Tuesday, May 19</div>
      <ul class="checkbox-list">
        <li>
          <label>
            <input type="checkbox" name="sessions" value="tues-traveler-intel">
            <span><span class="session-name">AI Traveler Intelligence</span><br><span class="session-time">10:20 &ndash; 10:50 AM</span></span>
          </label>
        </li>
        <li>
          <label>
            <input type="checkbox" name="sessions" value="tues-sales">
            <span><span class="session-name">AI for Sales</span><br><span class="session-time">12:45 &ndash; 1:15 PM</span></span>
          </label>
        </li>
        <li>
          <label>
            <input type="checkbox" name="sessions" value="tues-happy-hour">
            <span><span class="session-name">AI Confessional Happy Hour</span><br><span class="session-time">4:15 &ndash; 5:15 PM</span></span>
          </label>
        </li>
      </ul>

      <div class="day-label">Wednesday, May 20</div>
      <ul class="checkbox-list">
        <li>
          <label>
            <input type="checkbox" name="sessions" value="wed-leadership">
            <span><span class="session-name">AI for Leadership</span><br><span class="session-time">10:20 &ndash; 10:50 AM</span></span>
          </label>
        </li>
        <li>
          <label>
            <input type="checkbox" name="sessions" value="wed-champion">
            <span><span class="session-name">How to Be Your Organization's AI Champion</span><br><span class="session-time">12:45 &ndash; 1:15 PM</span></span>
          </label>
        </li>
        <li>
          <label>
            <input type="checkbox" name="sessions" value="wed-happy-hour">
            <span><span class="session-name">AI Confessional Happy Hour</span><br><span class="session-time">4:15 &ndash; 5:15 PM</span></span>
          </label>
        </li>
      </ul>

      <div class="day-label">Thursday, May 21</div>
      <ul class="checkbox-list">
        <li>
          <label>
            <input type="checkbox" name="sessions" value="thu-personal-os">
            <span><span class="session-name">Building a Personal OS in Claude Code</span><br><span class="session-time">10:20 &ndash; 10:50 AM</span></span>
          </label>
        </li>
        <li>
          <label>
            <input type="checkbox" name="sessions" value="thu-next-week">
            <span><span class="session-name">Turn This Week Into Next Week</span><br><span class="session-time">12:45 &ndash; 1:15 PM</span></span>
          </label>
        </li>
      </ul>
      <div class="day-label" style="margin-top: 1.25rem;">Team AI Training Session</div>
      <ul class="checkbox-list">
        <li>
          <label>
            <input type="checkbox" name="sessions" value="team-training" id="team-training-cb">
            <span><span class="session-name">Book a Training Session for My Team</span><br><span class="session-time">We'll come to your booth or host your team at ours (#1148) during an open appointment slot</span></span>
          </label>
        </li>
      </ul>

      <div id="training-details" style="display:none; margin-top: .75rem; padding-left: 1.5rem;">
        <label for="training-availability">When are you available? <span style="font-weight:400; color: var(--pond);">(day, time, booth #)</span></label>
        <textarea id="training-availability" name="training_availability" placeholder="e.g. Wednesday 11:00-12:30, Booth #2305 — 4 people" style="min-height: 60px;"></textarea>
      </div>
    </fieldset>

    <label for="questions">Anything you'd like to ask or discuss?</label>
    <textarea id="questions" name="questions" placeholder="Optional"></textarea>

    <button type="submit" class="submit-btn" id="submit-btn">Register</button>
    <div class="error-msg" id="error-msg"></div>
  </form>

  <a href="/ipw/" class="back-link">&larr; Back to schedule</a>
</div>

<script>
// Session metadata for .ics generation on confirmation page
const SESSIONS = {
  'tues-traveler-intel': { title: 'AI Traveler Intelligence', date: '20260519', start: '102000', end: '105000' },
  'tues-sales':          { title: 'AI for Sales', date: '20260519', start: '124500', end: '131500' },
  'tues-happy-hour':     { title: 'AI Confessional Happy Hour', date: '20260519', start: '161500', end: '171500' },
  'wed-leadership':      { title: 'AI for Leadership', date: '20260520', start: '102000', end: '105000' },
  'wed-champion':        { title: 'How to Be Your Organization\'s AI Champion', date: '20260520', start: '124500', end: '131500' },
  'wed-happy-hour':      { title: 'AI Confessional Happy Hour', date: '20260520', start: '161500', end: '171500' },
  'thu-personal-os':     { title: 'Building a Personal OS in Claude Code', date: '20260521', start: '102000', end: '105000' },
  'thu-next-week':       { title: 'Turn This Week Into Next Week', date: '20260521', start: '124500', end: '131500' }
};

// Pre-check session from query param
const params = new URLSearchParams(window.location.search);
const preselect = params.get('session');
if (preselect) {
  const cb = document.querySelector(`input[value="${preselect}"]`);
  if (cb) cb.checked = true;
}

// Toggle training availability field
document.getElementById('team-training-cb').addEventListener('change', function() {
  document.getElementById('training-details').style.display = this.checked ? 'block' : 'none';
});

// Google Apps Script Web App URL — replace after deploying the script
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwludtzHHQrU3cKiBYSs4au_Rt-9jqzNnCUZMtzLv9QtGcr3TW3KhHnNKbNJmkcWJBl/exec';

document.getElementById('rsvp-form').addEventListener('submit', async function(e) {
  e.preventDefault();
  const form = e.target;
  const btn = document.getElementById('submit-btn');
  const errEl = document.getElementById('error-msg');
  errEl.style.display = 'none';

  const sessions = Array.from(form.querySelectorAll('input[name="sessions"]:checked')).map(cb => cb.value);
  if (sessions.length === 0) {
    errEl.textContent = 'Please select at least one session.';
    errEl.style.display = 'block';
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Submitting…';

  const payload = {
    name: form.name.value,
    email: form.email.value,
    organization: form.organization.value,
    role: form.role.value,
    sessions: sessions.join(', '),
    training_availability: form.training_availability ? form.training_availability.value : '',
    questions: form.questions.value,
    timestamp: new Date().toISOString()
  };

  try {
    await fetch(APPS_SCRIPT_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });

    // Store registration data for confirmation page
    sessionStorage.setItem('ipw-registration', JSON.stringify({
      name: payload.name,
      email: payload.email,
      sessions: sessions
    }));

    // Redirect to confirmation
    window.location.href = '/ipw/confirmation/';

  } catch (err) {
    errEl.textContent = 'Something went wrong. Please try again.';
    errEl.style.display = 'block';
    btn.disabled = false;
    btn.textContent = 'Register';
  }
});
</script>

</body>
</html>
