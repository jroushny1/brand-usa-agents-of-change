<title>You're Registered — AI Meetup at IPW 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&family=Oswald:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --cyan: #00A9E0;
  --usa-blue: #00549F;
  --navy: #101F36;
  --slate: #4C5768;
  --pond: #878F9A;
  --cream: #F4EFE3;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Montserrat', sans-serif; color: var(--slate); background: #fff; line-height: 1.6; }

.topnav { background: #fff; padding: 1rem 2rem; }
.topnav a { display: inline-block; }
.topnav-logo { height: 70px; display: block; }

.section-banner { background: var(--navy); padding: 2rem 2rem 1.5rem; }
.section-banner h2 {
  max-width: 640px;
  margin: 0 auto;
  font-family: 'Oswald', sans-serif;
  font-size: 2rem;
  font-weight: 600;
  color: #fff;
  text-transform: uppercase;
  letter-spacing: .04em;
}

.container { max-width: 640px; margin: 0 auto; padding: 2rem 2rem 4rem; }

.confirmation-box {
  background: var(--cream);
  border-left: 4px solid var(--cyan);
  padding: 2rem;
  border-radius: 4px;
  margin-bottom: 2rem;
}
.confirmation-box h1 {
  font-family: 'Oswald', sans-serif;
  font-size: 1.8rem;
  color: var(--navy);
  margin-bottom: .5rem;
}
.confirmation-box p {
  font-size: .95rem;
  color: var(--slate);
  line-height: 1.7;
}
.registrant-name {
  font-weight: 700;
  color: var(--navy);
}

h3 {
  font-family: 'Oswald', sans-serif;
  font-size: 1.2rem;
  font-weight: 600;
  color: var(--navy);
  text-transform: uppercase;
  margin-bottom: 1rem;
}

.session-card {
  border: 1px solid #e8e8e8;
  border-radius: 4px;
  padding: 1rem 1.25rem;
  margin-bottom: .75rem;
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: .5rem;
}
.session-info .session-title {
  font-weight: 600;
  color: var(--navy);
  font-size: .95rem;
}
.session-info .session-datetime {
  font-size: .82rem;
  color: var(--pond);
  margin-top: .15rem;
}

.ics-btn {
  display: inline-flex;
  align-items: center;
  gap: .35rem;
  background: var(--navy);
  color: #fff;
  font-family: 'Montserrat', sans-serif;
  font-size: .75rem;
  font-weight: 600;
  text-decoration: none;
  padding: .45rem 1rem;
  border-radius: 4px;
  cursor: pointer;
  border: none;
  transition: background .2s;
  white-space: nowrap;
}
.ics-btn:hover { background: var(--usa-blue); }

.add-all-btn {
  display: inline-block;
  background: var(--cyan);
  color: #fff;
  font-family: 'Oswald', sans-serif;
  font-size: .95rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: .04em;
  text-decoration: none;
  padding: .65rem 2rem;
  border-radius: 4px;
  cursor: pointer;
  border: none;
  transition: background .2s;
  margin-top: .5rem;
}
.add-all-btn:hover { background: var(--usa-blue); }

.back-link {
  display: inline-block;
  margin-top: 1.5rem;
  font-size: .85rem;
  color: var(--cyan);
  text-decoration: none;
}
.back-link:hover { text-decoration: underline; }

.empty-state {
  text-align: center;
  padding: 3rem 1rem;
}
.empty-state p { margin-bottom: 1rem; }

@media (max-width: 600px) {
  .container { padding: 1.5rem 1rem 3rem; }
  .session-card { flex-direction: column; align-items: flex-start; }
}
</style>
<link rel="icon" href="/favicon.ico">
</head>

<div class="section-banner">
  <h2>Registration Confirmed</h2>
</div>

<div class="container">
  <!-- Populated state -->
  <div id="confirmed-content" style="display:none;">
    <div class="confirmation-box">
      <h1>You're in, <span id="registrant-name" class="registrant-name"></span>!</h1>
      <p>We've saved your registration. Add the sessions below to your calendar so you don't miss anything at the Brand USA Booth.</p>
    </div>

    <h3>Your Sessions</h3>
    <div id="session-list"></div>

    <button class="add-all-btn" id="add-all-btn">Add All to Calendar</button>

    <br>
    <a href="/ipw/" class="back-link">&larr; Back to full schedule</a>
  </div>

  <!-- Empty state (direct visit without registration) -->
  <div id="empty-state" class="empty-state" style="display:none;">
    <p>No registration found. Please register first.</p>
    <a href="/ipw/rsvp/" class="add-all-btn" style="text-decoration:none;">Register to Attend</a>
  </div>
</div>

<script>
const SESSIONS = {
  'tues-traveler-intel': { title: 'AI Traveler Intelligence', date: '20260519', start: '1020', end: '1050', day: 'Tuesday, May 19' },
  'tues-sales':          { title: 'AI for Sales', date: '20260519', start: '1245', end: '1315', day: 'Tuesday, May 19' },
  'tues-happy-hour':     { title: 'AI Confessional Happy Hour', date: '20260519', start: '1615', end: '1715', day: 'Tuesday, May 19' },
  'wed-leadership':      { title: 'AI for Leadership', date: '20260520', start: '1020', end: '1050', day: 'Wednesday, May 20' },
  'wed-champion':        { title: 'How to Be Your Organization\'s AI Champion', date: '20260520', start: '1245', end: '1315', day: 'Wednesday, May 20' },
  'wed-happy-hour':      { title: 'AI Confessional Happy Hour', date: '20260520', start: '1615', end: '1715', day: 'Wednesday, May 20' },
  'thu-personal-os':     { title: 'Building a Personal OS in Claude Code', date: '20260521', start: '1020', end: '1050', day: 'Thursday, May 21' },
  'thu-next-week':       { title: 'Turn This Week Into Next Week', date: '20260521', start: '1245', end: '1315', day: 'Thursday, May 21' }
};

// Fort Lauderdale is US/Eastern = UTC-4 in May (EDT)
function toUTC(dateStr, timeStr) {
  // timeStr like "1020" → 10:20 EDT → 14:20 UTC
  const h = parseInt(timeStr.slice(0, 2), 10) + 4; // EDT offset
  const m = timeStr.slice(2);
  return dateStr + 'T' + String(h).padStart(2, '0') + m + '00Z';
}

function formatTime(timeStr) {
  let h = parseInt(timeStr.slice(0, 2), 10);
  const m = timeStr.slice(2);
  const ampm = h >= 12 ? 'PM' : 'AM';
  if (h > 12) h -= 12;
  return h + ':' + m + ' ' + ampm;
}

function buildICS(sessionKeys) {
  let ics = [
    'BEGIN:VCALENDAR',
    'VERSION:2.0',
    'PRODID:-//Brand USA//AI Meetup IPW 2026//EN',
    'CALSCALE:GREGORIAN',
    'METHOD:PUBLISH'
  ];

  sessionKeys.forEach(key => {
    const s = SESSIONS[key];
    if (!s) return;
    const uid = key + '@ipw2026.janetteroush.com';
    ics.push(
      'BEGIN:VEVENT',
      'UID:' + uid,
      'DTSTART:' + toUTC(s.date, s.start),
      'DTEND:' + toUTC(s.date, s.end),
      'SUMMARY:' + s.title + ' — Brand USA Booth #1148 at IPW 2026',
      'LOCATION:Brand USA Booth\\, Broward County Convention Center\\, Fort Lauderdale FL',
      'DESCRIPTION:AI Meetup at IPW 2026. Details: janetteroush.com/ipw',
      'STATUS:CONFIRMED',
      'END:VEVENT'
    );
  });

  ics.push('END:VCALENDAR');
  return ics.join('\r\n');
}

function downloadICS(filename, content) {
  const blob = new Blob([content], { type: 'text/calendar;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

// Load registration from sessionStorage
const reg = JSON.parse(sessionStorage.getItem('ipw-registration') || 'null');

if (reg && reg.sessions && reg.sessions.length > 0) {
  document.getElementById('confirmed-content').style.display = 'block';
  document.getElementById('registrant-name').textContent = reg.name.split(' ')[0];

  const listEl = document.getElementById('session-list');
  reg.sessions.forEach(key => {
    const s = SESSIONS[key];
    if (!s) return;
    const card = document.createElement('div');
    card.className = 'session-card';
    card.innerHTML = `
      <div class="session-info">
        <div class="session-title">${s.title}</div>
        <div class="session-datetime">${s.day} &middot; ${formatTime(s.start)} &ndash; ${formatTime(s.end)}</div>
      </div>
      <button class="ics-btn" data-session="${key}">&#x1F4C5; Add to Calendar</button>
    `;
    listEl.appendChild(card);
  });

  // Individual .ics downloads
  listEl.addEventListener('click', function(e) {
    const btn = e.target.closest('.ics-btn');
    if (!btn) return;
    const key = btn.dataset.session;
    downloadICS(key + '.ics', buildICS([key]));
  });

  // Add all
  document.getElementById('add-all-btn').addEventListener('click', function() {
    downloadICS('ipw-2026-ai-meetup.ics', buildICS(reg.sessions));
  });

} else {
  document.getElementById('empty-state').style.display = 'block';
}
</script>
