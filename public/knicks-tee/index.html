  .chips { display: flex; flex-wrap: wrap; gap: 7px; }
  .chip {

<div class="wrap">

<script>
const SITE_TAG = "JANETTEROUSH.COM/KNICKS-TEE";

const FIXED_TOP = ["MY MAYOR MUSLIM", "MY BAGEL JEWISH"];
const FIXED_END = "KNICKS IN FIVE";
const DIOR = "MY CHRISTIAN DIOR";

// the Dior slot — same cadence, your own devotion
const SUGGESTIONS = [
  "MY CHRISTIAN DIOR",
  "MY RAT GORGEOUS",
  "MY THERAPIST PROUD",
  "MY LANDLORD NERVOUS",
  "MY BODEGA ETERNAL",
  "MY SLICE FOLDED",
  "MY GARDEN ELECTRIC",
  "MY PIGEON FEARLESS"
];

const STYLES = [
  { key: "marker",  name: "MARKER",     font: "Permanent Marker" },
  { key: "scrawl",  name: "SCRAWL",     font: "Rock Salt" },
  { key: "puff",    name: "PUFF PAINT", font: "Caveat" },
  { key: "ironon",  name: "IRON-ON",    font: "Archivo Black" }
];

const TEE_COLORS = [
  { name: "white",  tee: "#fbfaf5", outline: "#1b1b1f" },
  { name: "cream",  tee: "#f3ecd8", outline: "#1b1b1f" },
  { name: "heather",tee: "#d9d9d6", outline: "#1b1b1f" },
  { name: "blue",   tee: "#006BB6", outline: "#0c2438" },
  { name: "orange", tee: "#F58426", outline: "#5d2e06" },
  { name: "black",  tee: "#222226", outline: "#000000" }
];

const INKS = [
  { name: "black",     colors: ["#1b1b1f"] },
  { name: "blue",      colors: ["#006BB6"] },
  { name: "orange",    colors: ["#F58426"] },
  { name: "blue+orange", colors: ["#006BB6", "#F58426"] },
  { name: "white",     colors: ["#ffffff"] }
];

const FORMATS = [
  { key: "story",  name: "STORY 9:16",  w: 1080, h: 1920 },
  { key: "square", name: "SQUARE 1:1",  w: 1080, h: 1080 }
];

const state = {
  style: "marker",
  teeColor: 0,
  ink: 3,           // blue+orange default — it's a knicks shirt
  format: "square",
  rhyme: "FIVE"
};

// ---------- seeded wobble ----------
function hashStr(s) {
  let h = 2166136261;
  for (let i = 0; i < s.length; i++) { h ^= s.charCodeAt(i); h = Math.imul(h, 16777619); }
  return h >>> 0;
}
function mulberry32(seed) {
  return function () {
    seed |= 0; seed = (seed + 0x6D2B79F5) | 0;
    let t = Math.imul(seed ^ (seed >>> 15), 1 | seed);
    t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}

// ---------- canvas helpers ----------
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

function wobblyLine(c, x1, y1, x2, y2, mag, rnd) {
  const segs = Math.max(2, Math.floor(Math.hypot(x2 - x1, y2 - y1) / 40));
  c.moveTo(x1, y1);
  for (let i = 1; i <= segs; i++) {
    const t = i / segs;
    const nx = x1 + (x2 - x1) * t + (rnd() - 0.5) * mag;
    const ny = y1 + (y2 - y1) * t + (rnd() - 0.5) * mag;
    c.lineTo(nx, ny);
  }
}

function wobblyPath(c, pts, mag, rnd, close) {
  c.beginPath();
  for (let i = 0; i < pts.length - 1; i++) {
    if (i === 0) c.moveTo(pts[0][0], pts[0][1]);
    wobblyLine(c, pts[i][0], pts[i][1], pts[i + 1][0], pts[i + 1][1], mag, rnd);
  }
  if (close) c.closePath();
}

// ---------- tee drawing ----------
function teePoints(x, y, w, h) {
  const p = (px, py) => [x + px * w, y + py * h];
  return [
    p(0.38, 0.055),                 // neck left
    p(0.205, 0.095),                // shoulder left
    p(0.03, 0.265),                 // sleeve outer left
    p(0.115, 0.415),                // sleeve hem left
    p(0.255, 0.335),                // armpit left
    p(0.245, 0.95),                 // hem left
    p(0.755, 0.95),                 // hem right
    p(0.745, 0.335),                // armpit right
    p(0.885, 0.415),                // sleeve hem right
    p(0.97, 0.265),                 // sleeve outer right
    p(0.795, 0.095),                // shoulder right
    p(0.62, 0.055)                  // neck right
  ];
}

function drawTee(c, x, y, w, h, teeColor, outlineColor, seed) {
  const rnd = mulberry32(seed);
  const mag = w * 0.012;
  const pts = teePoints(x, y, w, h);

  // shirt body
  c.save();
  wobblyPath(c, pts, mag, rnd, false);
  // neckline scoop closes the shape
  c.quadraticCurveTo(x + 0.5 * w, y + 0.16 * h, pts[0][0], pts[0][1]);
  c.closePath();
  c.fillStyle = teeColor;
  c.fill();
  c.lineJoin = "round";
  c.lineCap = "round";
  c.strokeStyle = outlineColor;
  c.lineWidth = w * 0.012;
  c.stroke();
  // second sketchy pass, slightly offset
  c.save();
  c.translate(w * 0.004, -w * 0.003);
  c.globalAlpha = 0.45;
  c.lineWidth = w * 0.006;
  c.stroke();
  c.restore();

  // collar
  c.beginPath();
  c.moveTo(pts[0][0], pts[0][1]);
  c.quadraticCurveTo(x + 0.5 * w, y + 0.205 * h, pts[11][0], pts[11][1]);
  c.lineWidth = w * 0.009;
  c.globalAlpha = 0.85;
  c.stroke();
  c.globalAlpha = 1;

  // sleeve seams
  c.beginPath();
  wobblyLine(c, pts[1][0] + w * 0.03, pts[1][1] + h * 0.02, pts[4][0], pts[4][1], mag, rnd);
  c.moveTo(pts[10][0] - w * 0.03, pts[10][1] + h * 0.02);
  wobblyLine(c, pts[10][0] - w * 0.03, pts[10][1] + h * 0.02, pts[7][0], pts[7][1], mag, rnd);
  c.lineWidth = w * 0.006;
  c.globalAlpha = 0.5;
  c.stroke();
  c.globalAlpha = 1;

  // hem stitches
  c.beginPath();
  c.setLineDash([w * 0.018, w * 0.014]);
  wobblyLine(c, pts[5][0] + w * 0.02, pts[5][1] - h * 0.025, pts[6][0] - w * 0.02, pts[6][1] - h * 0.025, mag * 0.5, rnd);
  c.lineWidth = w * 0.005;
  c.globalAlpha = 0.5;
  c.stroke();
  c.setLineDash([]);
  c.globalAlpha = 1;
  c.restore();
}

// ---------- text on tee ----------
function fitFont(c, text, fontFamily, weight, maxW, startSize) {
  let size = startSize;
  while (size > 14) {
    c.font = `${weight} ${size}px "${fontFamily}"`;
    if (c.measureText(text).width <= maxW) break;
    size -= 2;
  }
  return size;
}

function drawChant(c, lines, style, inks, teeIsDark, x, y, w, h, seed) {
  const rnd = mulberry32(seed + 7);
  const styleDef = STYLES.find(s => s.key === style);
  // keep lettering on the shirt body, off the sleeves
  const maxW = w * 0.44;
  const cx = x + w * 0.5;
  const active = lines.filter(l => l.trim().length);
  if (!active.length) return;

  const baseSize = style === "puff" ? w * 0.078 : w * 0.058;
  const weight = style === "puff" ? "700" : "400";

  // measure all lines first so the block centers vertically in the chest area;
  // the closer gets to be the loudest line on the shirt
  const sizes = active.map((l, i) => {
    const big = i === active.length - 1;
    return fitFont(c, l, styleDef.font, weight, maxW * (big ? 1.08 : 1), baseSize * (big ? 1.3 : 1));
  });
  const gaps = sizes.map(s => s * (style === "scrawl" ? 1.65 : 1.3));
  const totalH = gaps.reduce((a, b) => a + b, 0);
  const chestTop = y + h * 0.27;
  const chestH = h * 0.52;
  let ty = chestTop + Math.max(0, (chestH - totalH) / 2) + sizes[0];
  let lastBaseline = ty;

  active.forEach((line, i) => {
    const ink = inks[i % inks.length];
    const size = sizes[i];
    c.save();
    c.translate(cx, ty);
    c.rotate(((rnd() - 0.5) * 2) * Math.PI / 180);
    c.font = `${weight} ${size}px "${styleDef.font}"`;
    c.textAlign = "center";
    c.textBaseline = "alphabetic";
    const lineW = c.measureText(line).width;

    if (style === "ironon") {
      // each letter placed by hand, slightly crooked
      const letters = line.split("");
      const widths = letters.map(ch => c.measureText(ch).width);
      const lineW = widths.reduce((a, b) => a + b, 0);
      let lx = -lineW / 2;
      c.textAlign = "left";
      letters.forEach((ch, li) => {
        c.save();
        c.translate(lx + widths[li] / 2, (rnd() - 0.5) * size * 0.16);
        c.rotate((rnd() - 0.5) * 0.12);
        c.fillStyle = ink;
        c.fillText(ch, -widths[li] / 2, 0);
        c.restore();
        lx += widths[li];
      });
    } else if (style === "puff") {
      c.lineJoin = "round";
      c.lineWidth = size * 0.28;
      c.strokeStyle = teeIsDark ? "rgba(255,255,255,.92)" : "rgba(27,27,31,.85)";
      c.strokeText(line, 0, 0);
      c.fillStyle = ink;
      c.fillText(line, 0, 0);
    } else {
      c.fillStyle = ink;
      c.fillText(line, 0, 0);
      if (style === "marker") {
        // double pass = marker that ran out a little
        c.globalAlpha = 0.4;
        c.fillText(line, size * 0.02, -size * 0.015);
        c.globalAlpha = 1;
      }
    }
    // little stars flank the closer
    if (i === active.length - 1) {
      drawStar(c, -lineW / 2 - size * 0.5, -size * 0.32, size * 0.18, ink, rnd);
      drawStar(c, lineW / 2 + size * 0.5, -size * 0.32, size * 0.18, ink, rnd);
    }
    c.restore();
    lastBaseline = ty;
    ty += gaps[i] || 0;
  });

  // underline flourish below the last line
  const lastSize = sizes[sizes.length - 1];
  const flY = lastBaseline + lastSize * 0.45;
  c.save();
  c.strokeStyle = inks[(active.length - 1) % inks.length];
  c.lineWidth = lastSize * 0.07;
  c.lineCap = "round";
  c.beginPath();
  wobblyLine(c, cx - maxW * 0.3, flY, cx + maxW * 0.3, flY, 5, rnd);
  c.stroke();
  c.restore();
}

// ---------- doodles ----------
function drawStar(c, x, y, r, color, rnd) {
  c.save();
  c.translate(x, y);
  c.rotate(rnd() * Math.PI);
  c.strokeStyle = color;
  c.lineWidth = r * 0.22;
  c.lineCap = "round";
  c.beginPath();
  for (let i = 0; i < 5; i++) {
    const a1 = (i * 144 - 90) * Math.PI / 180;
    c.lineTo(Math.cos(a1) * r, Math.sin(a1) * r);
  }
  c.closePath();
  c.stroke();
  c.restore();
}

function drawBall(c, x, y, r, color, rnd) {
  c.save();
  c.translate(x, y);
  c.rotate((rnd() - 0.5) * 0.6);
  c.strokeStyle = color;
  c.lineWidth = r * 0.16;
  c.lineCap = "round";
  c.beginPath(); c.arc(0, 0, r, 0, Math.PI * 2); c.stroke();
  c.beginPath(); c.moveTo(-r, 0); c.quadraticCurveTo(0, r * 0.25, r, 0); c.stroke();
  c.beginPath(); c.moveTo(0, -r); c.quadraticCurveTo(r * 0.25, 0, 0, r); c.stroke();
  c.restore();
}

function drawHeart(c, x, y, r, color, rnd) {
  c.save();
  c.translate(x, y);
  c.rotate((rnd() - 0.5) * 0.5);
  c.strokeStyle = color;
  c.lineWidth = r * 0.22;
  c.lineJoin = "round";
  c.beginPath();
  c.moveTo(0, r * 0.35);
  c.bezierCurveTo(-r * 1.3, -r * 0.55, -r * 0.5, -r * 1.25, 0, -r * 0.45);
  c.bezierCurveTo(r * 0.5, -r * 1.25, r * 1.3, -r * 0.55, 0, r * 0.35);
  c.closePath();
  c.stroke();
  c.restore();
}

function drawPin(c, x, y, w, color, outline) {
  c.save();
  c.translate(x, y);
  c.fillStyle = color;
  c.strokeStyle = outline;
  c.lineWidth = w * 0.14;
  c.lineJoin = "round";
  const pw = w, ph = w * 2.3;
  c.beginPath();
  c.roundRect(-pw / 2, -ph * 0.62, pw, ph, w * 0.35);
  c.fill();
  c.stroke();
  // spring slot
  c.beginPath();
  c.moveTo(0, ph * 0.05);
  c.lineTo(0, ph * 0.38);
  c.lineWidth = w * 0.16;
  c.globalAlpha = 0.55;
  c.stroke();
  c.restore();
}

function drawSpark(c, x, y, r, color) {
  c.save();
  c.strokeStyle = color;
  c.lineWidth = r * 0.25;
  c.lineCap = "round";
  for (let i = 0; i < 3; i++) {
    const a = (-30 + i * 30) * Math.PI / 180;
    c.beginPath();
    c.moveTo(x + Math.cos(a) * r * 0.5, y + Math.sin(a) * r * 0.5);
    c.lineTo(x + Math.cos(a) * r * 1.4, y + Math.sin(a) * r * 1.4);
    c.stroke();
  }
  c.restore();
}

// ---------- compose ----------
function render() {
  const fmt = FORMATS.find(f => f.key === state.format);
  canvas.width = fmt.w;
  canvas.height = fmt.h;

  const line3 = document.getElementById("line3").value.toUpperCase();
  const lines = [FIXED_TOP[0], FIXED_TOP[1], line3, FIXED_END];
  const tee = TEE_COLORS[state.teeColor];
  const inks = INKS[state.ink].colors;
  const teeIsDark = ["blue", "orange", "black"].includes(tee.name);
  const seed = hashStr(state.style + tee.name + lines.join("|") + state.format);
  const rnd = mulberry32(seed + 99);

  // poster background
  ctx.fillStyle = "#f6f1e4";
  ctx.fillRect(0, 0, fmt.w, fmt.h);
  ctx.fillStyle = "rgba(0,107,182,.05)";
  for (let gy = 0; gy < fmt.h; gy += 26) {
    for (let gx = 0; gx < fmt.w; gx += 26) {
      if ((gx + gy) % 52 === 0) ctx.fillRect(gx, gy, 3, 3);
    }
  }

  // headline
  const headY = fmt.h * (state.format === "story" ? 0.085 : 0.10);
  ctx.save();
  ctx.translate(fmt.w / 2, headY);
  ctx.rotate(-0.025);
  ctx.font = `400 ${fmt.w * 0.062}px "Permanent Marker"`;
  ctx.textAlign = "center";
  ctx.fillStyle = "#006BB6";
  ctx.fillText("NEW YORK IS A", 0, 0);
  ctx.fillStyle = "#F58426";
  ctx.fillText("FEELING RIGHT NOW", 0, fmt.w * 0.075);
  ctx.restore();

  // tee — sized to always fit between headline and footer
  const teeY = state.format === "story"
    ? headY + fmt.w * 0.16
    : headY + fmt.w * 0.115;
  const footerRoom = fmt.w * (state.format === "story" ? 0.55 : 0.13);
  let teeW = fmt.w * 0.82;
  const maxTeeH = fmt.h - teeY - footerRoom;
  if (teeW * 1.06 > maxTeeH) teeW = maxTeeH / 1.06;
  const teeH = teeW * 1.06;
  const teeX = (fmt.w - teeW) / 2;

  // clothesline strung across the frame, sagging a little under the weight of belief
  const ropeY = teeY + teeH * 0.055;
  ctx.save();
  ctx.strokeStyle = "#8a6f4d";
  ctx.lineWidth = fmt.w * 0.006;
  ctx.lineCap = "round";
  ctx.beginPath();
  ctx.moveTo(-10, ropeY - fmt.w * 0.035);
  ctx.quadraticCurveTo(fmt.w * 0.5, ropeY + fmt.w * 0.045, fmt.w + 10, ropeY - fmt.w * 0.045);
  ctx.stroke();
  ctx.restore();

  // tee hangs from the line, slightly crooked, like laundry
  const teeCx = teeX + teeW / 2;
  ctx.save();
  ctx.translate(teeCx, teeY);
  ctx.rotate(-0.022);
  ctx.translate(-teeCx, -teeY);

  // soft shadow behind tee
  ctx.save();
  ctx.translate(10, 14);
  ctx.globalAlpha = 0.12;
  const shRnd = mulberry32(seed);
  wobblyPath(ctx, teePoints(teeX, teeY, teeW, teeH), 8, shRnd, true);
  ctx.fillStyle = "#1b1b1f";
  ctx.fill();
  ctx.restore();

  drawTee(ctx, teeX, teeY, teeW, teeH, tee.tee, tee.outline, seed);
  drawChant(ctx, lines, state.style, inks, teeIsDark, teeX, teeY, teeW, teeH, seed);

  // care label peeking out of the hem
  const tagW = teeW * 0.185, tagH = teeW * 0.115;
  const tagX = teeX + teeW * 0.60, tagY = teeY + teeH * 0.938;
  ctx.save();
  ctx.translate(tagX + tagW / 2, tagY);
  ctx.rotate(0.05);
  ctx.fillStyle = "#fffef8";
  ctx.strokeStyle = "rgba(27,27,31,.8)";
  ctx.lineWidth = fmt.w * 0.0035;
  ctx.beginPath();
  ctx.roundRect(-tagW / 2, 0, tagW, tagH, 6);
  ctx.fill();
  ctx.stroke();
  ctx.font = `700 ${tagH * 0.34}px "Caveat"`;
  ctx.textAlign = "center";
  ctx.fillStyle = "#1b1b1f";
  ctx.fillText("100% cotton", 0, tagH * 0.42);
  ctx.fillStyle = "#F58426";
  ctx.fillText("100% believing", 0, tagH * 0.80);
  ctx.restore();

  // wooden clothespins at the shoulders
  const pinW = fmt.w * 0.022;
  drawPin(ctx, teeX + teeW * 0.235, teeY + teeH * 0.085, pinW, "#d3a86c", "#8a6f4d");
  drawPin(ctx, teeX + teeW * 0.765, teeY + teeH * 0.082, pinW, "#d3a86c", "#8a6f4d");

  ctx.restore(); // end hanging-tee group

  // doodles in the margins
  const dColors = ["#006BB6", "#F58426"];
  const spots = state.format === "story"
    ? [[0.10, 0.045], [0.90, 0.05], [0.07, 0.42], [0.93, 0.46], [0.10, 0.86], [0.88, 0.84], [0.5, 0.93]]
    : [[0.07, 0.05], [0.93, 0.06], [0.05, 0.55], [0.95, 0.58], [0.12, 0.93], [0.88, 0.94]];
  spots.forEach(([fx, fy], i) => {
    const x = fx * fmt.w, y = fy * fmt.h, col = dColors[i % 2];
    const kind = i % 4;
    if (kind === 0) drawStar(ctx, x, y, fmt.w * 0.022, col, rnd);
    else if (kind === 1) drawBall(ctx, x, y, fmt.w * 0.024, col, rnd);
    else if (kind === 2) drawHeart(ctx, x, y, fmt.w * 0.020, col, rnd);
    else drawSpark(ctx, x, y, fmt.w * 0.018, col);
  });

  // story format gets the arena chant in the space below the tee
  if (state.format === "story") {
    ctx.save();
    ctx.translate(fmt.w / 2, teeY + teeH + fmt.w * 0.16);
    ctx.rotate(0.02);
    ctx.font = `400 ${fmt.w * 0.075}px "Permanent Marker"`;
    ctx.textAlign = "center";
    ctx.fillStyle = "#006BB6";
    ctx.fillText("GO NY GO NY GO", 0, 0);
    ctx.font = `700 ${fmt.w * 0.05}px "Caveat"`;
    ctx.fillStyle = "#F58426";
    ctx.fillText("✶ the whole city is humming ✶", 0, fmt.w * 0.085);
    ctx.restore();
  }

  // footer tag
  ctx.save();
  ctx.font = `700 ${fmt.w * 0.030}px "Caveat"`;
  ctx.textAlign = "center";
  ctx.fillStyle = "rgba(27,27,31,.65)";
  ctx.fillText(`★ ${SITE_TAG} ★`, fmt.w / 2, fmt.h - fmt.w * 0.035);
  ctx.restore();
}

// ---------- UI wiring ----------
function buildChips(containerId, items, getLabel, isOn, onPick) {
  const el = document.getElementById(containerId);
  el.innerHTML = "";
  items.forEach((item, i) => {
    const b = document.createElement("button");
    b.className = "chip" + (isOn(item, i) ? " on" : "");
    b.textContent = getLabel(item);
    b.onclick = () => { onPick(item, i); refreshUI(); render(); };
    el.appendChild(b);
  });
}

function buildSwatches(containerId, items, getColor, isOn, onPick) {
  const el = document.getElementById(containerId);
  el.innerHTML = "";
  items.forEach((item, i) => {
    const s = document.createElement("div");
    s.className = "swatch" + (isOn(item, i) ? " on" : "");
    s.style.background = getColor(item);
    s.title = item.name;
    s.onclick = () => { onPick(item, i); refreshUI(); render(); };
    el.appendChild(s);
  });
}

function refreshUI() {
  buildChips("suggestions", SUGGESTIONS, s => s,
    s => document.getElementById("line3").value.toUpperCase() === s,
    s => { document.getElementById("line3").value = s; });
  buildChips("styles", STYLES, s => s.name,
    s => s.key === state.style,
    s => { state.style = s.key; });
  buildChips("formats", FORMATS, f => f.name,
    f => f.key === state.format,
    f => { state.format = f.key; });
  buildSwatches("teeColors", TEE_COLORS, t => t.tee,
    (t, i) => i === state.teeColor,
    (t, i) => { state.teeColor = i; });
  buildSwatches("inkColors", INKS,
    k => k.colors.length > 1
      ? `linear-gradient(135deg, ${k.colors[0]} 50%, ${k.colors[1]} 50%)`
      : k.colors[0],
    (k, i) => i === state.ink,
    (k, i) => { state.ink = i; });
}

document.getElementById("line3").addEventListener("input", () => { refreshUI(); render(); });

document.getElementById("reset").onclick = () => {
  document.getElementById("line3").value = DIOR;
  refreshUI(); render();
};

document.getElementById("download").onclick = async () => {
  render();
  const blob = await new Promise(res => canvas.toBlob(res, "image/png"));
  const file = new File([blob], "my-knicks-tee.png", { type: "image/png" });
  if (navigator.canShare && navigator.canShare({ files: [file] })) {
    try { await navigator.share({ files: [file], title: "My Knicks Tee" }); return; }
    catch (e) { /* user cancelled share — fall through to download */ }
  }
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "my-knicks-tee.png";
  a.click();
  URL.revokeObjectURL(a.href);
};

refreshUI();
document.fonts.ready.then(render);
render();
</script>
